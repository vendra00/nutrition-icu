spring.application.name=nutrition-icu

# Datasource is auto-configured in dev by spring-boot-docker-compose (compose.yaml).
# In other environments, override spring.datasource.* via env vars.

# --- JPA / Hibernate ---
# Hibernate manages the schema from the entities for now (no Flyway). 'update' keeps data across
# restarts (so saved insights, alerts and seeded demo data persist); startup runners are idempotent.
# For production, move to a versioned migration tool (Flyway/Liquibase) and ddl-auto=validate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- PDF ingestion ---
# Root folder for report PDFs. The front-end may pick a subfolder under this root;
# paths that escape the root are rejected. Override with an absolute path in production.
app.ingestion.root=src/main/resources/data
# Ingest the root automatically on startup (set false to use POST /api/lab-tests/ingest only).
app.ingestion.on-startup=true

# --- Sandbox seeding (dev/demo only) ---
# Seeds fake doctors and marks all ingested patients as monitored. Disable in production.
app.sandbox.seed=true

# --- AI insights (Anthropic Claude) ---
# Requires an Anthropic API key from console.anthropic.com (pay-as-you-go), which is SEPARATE
# from a Claude.ai subscription. Provide it via the ANTHROPIC_API_KEY environment variable;
# never commit a real key. When unset, the Insights view shows a setup notice instead of calling out.
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6
anthropic.max-tokens=1400
# Folder of reference study/guideline PDFs the model is grounded on (see knowledge/README.md).
app.insights.knowledge-root=src/main/resources/knowledge
