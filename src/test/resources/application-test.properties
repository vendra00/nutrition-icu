# Test profile: an in-memory H2 database in PostgreSQL-compatibility mode, so the Spring context loads
# without a running Postgres (and CI can run offline). Overrides the production-leaning defaults in the
# main application.properties; the heavy startup runners are switched off so tests stay fast and isolated.

spring.datasource.url=jdbc:h2:mem:nutrition;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Build the schema from the entities for each test run, then drop it.
spring.jpa.hibernate.ddl-auto=create-drop

# Don't ingest the PDF root or seed the sandbox / 100 closed cases during tests.
app.ingestion.on-startup=false
app.sandbox.seed=false
